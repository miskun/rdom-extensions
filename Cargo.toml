[package]
name = "rdom-extensions"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
description = "Optional data-visualization components (charts, sparklines, gauges, virtual tables) built on top of the rdom terminal DOM."
repository = "https://github.com/miskun/rdom-extensions"
keywords = ["tui", "dom", "chart", "dataviz", "terminal"]
categories = ["command-line-interface", "visualization"]
readme = "README.md"

[dependencies]
# Downstream consumer of the rdom substrate. We depend only on the
# public rdom-tui surface (canvas paint API, Color/Style, element
# builders, event listeners) — no private hooks. Path dep during
# co-development; swap to the crates.io version pin before publish.
rdom-tui = { path = "../rdom/crates/rdom-tui", version = "0.2" }

[dev-dependencies]
crossterm = "0.28"
